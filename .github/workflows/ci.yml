name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.11", "3.12"]
    env:
      # The package imports PyQt6.QtWidgets, so a (headless) Qt platform is needed.
      QT_QPA_PLATFORM: offscreen
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install Qt runtime libraries (Linux)
        # Linux runners are headless and lack the system libs the PyQt6 wheel
        # links against. Windows/macOS PyQt6 wheels bundle Qt, so this is skipped.
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libegl1 libgl1 libxkbcommon0 libdbus-1-3 libglib2.0-0 libxcb-cursor0

      - name: Install package with dev extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check path_planning_visualizer tests

      - name: Test (pytest)
        run: pytest -q

      - name: Benchmark smoke
        run: python -m path_planning_visualizer.benchmark --seeds 1 --planners "A*,RRT*" --maps wall

      - name: Build wheel and verify bundled assets
        # Pure-Python (py3-none-any) wheel, so one build is representative.
        if: runner.os == 'Linux' && matrix.python-version == '3.12'
        run: |
          python -m pip install build
          python -m build --wheel
          python - <<'PY'
          import glob, os, zipfile
          whl = glob.glob("dist/*.whl")[0]
          in_wheel = sorted(os.path.basename(n) for n in zipfile.ZipFile(whl).namelist() if n.endswith(".png"))
          in_source = sorted(os.path.basename(p) for p in glob.glob("path_planning_visualizer/assets/*.png"))
          assert in_wheel, "no bundled maps found in the wheel"
          # Compare against the source assets (not a hard-coded count) so adding/removing a
          # bundled map never breaks CI, while still catching assets that fail to bundle.
          assert in_wheel == in_source, f"bundled maps {in_wheel} != source maps {in_source}"
          print("wheel ships assets:", in_wheel)
          PY
